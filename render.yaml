services:
  - type: web
    name: agri-assistant-ai
    runtime: python
    rootDir: agri-assistant-ai
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Render's default Python image is too new to have a prebuilt tiktoken wheel,
      # which makes pip fall back to a from-source Rust build that fails on Render's
      # read-only build filesystem (no cargo cache dir). Pin to a version tiktoken
      # already ships wheels for.
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: EMBEDDING_MODEL
        sync: false
      - key: SEMANTIC_MATCH_THRESHOLD
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        sync: false
      - key: ATLAS_VECTOR_INDEX
        sync: false
      - key: DOCUMENT_CHUNKS_VECTOR_INDEX
        sync: false
      - key: RAG_TOP_K
        sync: false
      - key: RAG_MATCH_THRESHOLD
        sync: false
      - key: DATA_GOV_IN_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
